name: Build and Push to TCR

on:
  push:
    branches: [main]

env:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: ${{ secrets.TCR_NAMESPACE }}

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to TCR
        run: |
          echo "USERNAME len=${#TCR_U} first=${TCR_U:0:3} last=${TCR_U: -3}"
          echo "PASSWORD len=${#TCR_P} first=${TCR_P:0:3} last=${TCR_P: -3}"
          echo "NAMESPACE=[$TCR_NS] len=${#TCR_NS}"
          docker login -u ${{ secrets.TCR_USERNAME }} -p "${{ secrets.TCR_PASSWORD }}" ccr.ccs.tencentyun.com
        env:
          TCR_U: ${{ secrets.TCR_USERNAME }}
          TCR_P: ${{ secrets.TCR_PASSWORD }}
          TCR_NS: ${{ secrets.TCR_NAMESPACE }}

      - name: Build backend image
        run: docker build -t $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-backend:${{ github.sha }} -t $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-backend:latest -f server/Dockerfile ./server

      - name: Push backend image
        run: |
          docker push $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-backend:${{ github.sha }}
          docker push $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-backend:latest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to TCR
        run: |
          echo "USERNAME len=${#TCR_U} first=${TCR_U:0:3} last=${TCR_U: -3}"
          echo "PASSWORD len=${#TCR_P} first=${TCR_P:0:3} last=${TCR_P: -3}"
          echo "NAMESPACE=[$TCR_NS] len=${#TCR_NS}"
          docker login -u ${{ secrets.TCR_USERNAME }} -p "${{ secrets.TCR_PASSWORD }}" ccr.ccs.tencentyun.com
        env:
          TCR_U: ${{ secrets.TCR_USERNAME }}
          TCR_P: ${{ secrets.TCR_PASSWORD }}
          TCR_NS: ${{ secrets.TCR_NAMESPACE }}

      - name: Build frontend image
        run: docker build -t $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-web:${{ github.sha }} -t $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-web:latest -f web/Dockerfile ./web

      - name: Push frontend image
        run: |
          docker push $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-web:${{ github.sha }}
          docker push $TCR_REGISTRY/$TCR_NAMESPACE/music-agent-web:latest
