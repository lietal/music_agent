services:
  postgres:
    image: postgres:16-alpine
    container_name: music-agent-db
    environment:
      POSTGRES_DB: music_agent
      POSTGRES_USER: music_agent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-music_agent}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U music_agent -d music_agent"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: music-agent-backend
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DATABASE_URL: postgres://music_agent:${DB_PASSWORD:-music_agent}@postgres:5432/music_agent?sslmode=disable
      LLM_API_KEY: ${LLM_API_KEY:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
